<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIMantraas — For Business</title>
    <link rel="icon" type="image/png" href="bglogo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    bg: '#050505',
                    'bg-secondary': '#0A0A0A',
                    cyan: {
                        DEFAULT: '#00D4FF',
                        glow: 'rgba(0, 212, 255, 0.5)',
                    },
                    purple: {
                        DEFAULT: '#8B5CF6',
                        glow: 'rgba(139, 92, 246, 0.5)',
                    },
                    slate: {
                        DEFAULT: '#A1A1AA',
                        dark: '#71717A',
                    }
                },
                fontFamily: {
                    sans: ['Inter', 'sans-serif'],
                    display: ['Sora', 'sans-serif'],
                },
                animation: {
                    'gradient': 'gradient 8s linear infinite',
                    'marquee': 'marquee 25s linear infinite',
                    'float': 'float 6s ease-in-out infinite',
                    'pulse-glow': 'pulse-glow 2s ease-in-out infinite',
                },
                keyframes: {
                    gradient: {
                        '0%, 100%': { backgroundPosition: '0% 50%' },
                        '50%': { backgroundPosition: '100% 50%' },
                    },
                    marquee: {
                        '0%': { transform: 'translateX(0%)' },
                        '100%': { transform: 'translateX(-50%)' },
                    },
                    float: {
                        '0%, 100%': { transform: 'translateY(0px)' },
                        '50%': { transform: 'translateY(-20px)' },
                    },
                    'pulse-glow': {
                        '0%, 100%': { boxShadow: '0 0 20px rgba(0, 212, 255, 0.3)' },
                        '50%': { boxShadow: '0 0 40px rgba(0, 212, 255, 0.6)' },
                    }
                }
            }
        }
    }
</script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        font-family: 'Inter', sans-serif;
        background-color: #050505;
        color: #A1A1AA;
        overflow-x: hidden;
    }

    ::-webkit-scrollbar {
        width: 8px;
    }

    ::-webkit-scrollbar-track {
        background: #0A0A0A;
    }

    ::-webkit-scrollbar-thumb {
        background: #27272A;
        border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: #3F3F46;
    }

    .gradient-text {
        background: linear-gradient(90deg, #00D4FF 0%, #8B5CF6 25%, #00D4FF 50%, #8B5CF6 75%, #00D4FF 100%);
        background-size: 200% 100%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: gradient 8s linear infinite;
    }

    @keyframes gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-in {
        animation: fadeIn 0.8s ease forwards;
        opacity: 0;
    }

    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }

    /* Hero Background */
    .hero-bg {
        position: absolute;
        inset: 0;
        background: 
            linear-gradient(to right, #050505 0%, transparent 30%),
            url('bglogo.png') right center/90% no-repeat;
        z-index: 0;
    }

    .hero-bg::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent 50%, #050505 100%);
    }

    /* NAV */
    nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 48px;
        background: rgba(5, 5, 5, 0.95);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .logo {
        font-family: 'Sora', sans-serif;
        font-weight: 800;
        font-size: 1.25rem;
        letter-spacing: -0.5px;
        color: white;
        text-decoration: none;
    }

    .logo span {
        background: linear-gradient(90deg, #00D4FF 0%, #8B5CF6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    nav a.cta-nav {
        background: linear-gradient(135deg, #00D4FF, #8B5CF6);
        color: #050505;
        padding: 10px 22px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.875rem;
        transition: all 0.2s;
    }
    nav a.cta-nav:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
    }

    /* HERO */
    .hero {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1fr;
        gap: 0;
        padding-top: 80px;
        position: relative;
    }

    .hero-left {
        padding: 100px 40px 80px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        max-width: 800px;
        margin: 0;
        width: 100%;
        position: relative;
        z-index: 10;
        text-align: left;
    }
    
    .hero-left * {
        text-align: left !important;
    }

    .eyebrow {
        font-family: 'Sora', sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        background: linear-gradient(90deg, #00D4FF, #8B5CF6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .eyebrow::before {
        content: '';
        display: block;
        width: 28px;
        height: 2px;
        background: linear-gradient(90deg, #00D4FF, #8B5CF6);
    }

    h1 {
        font-family: 'Sora', sans-serif;
        font-size: clamp(2.8rem, 5vw, 4.2rem);
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: -2px;
        color: white;
        margin-bottom: 28px;
    }

    h1 em {
        font-style: normal;
        background: linear-gradient(90deg, #00D4FF 0%, #8B5CF6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        position: relative;
    }

    h1 em::after {
        content: '';
        position: absolute;
        bottom: 4px;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #00D4FF, #8B5CF6);
        opacity: 0.3;
    }

    .hero-sub {
        font-size: 1.1rem;
        color: #71717A;
        max-width: 480px;
        margin-bottom: 40px;
        line-height: 1.7;
        font-weight: 300;
    }

    .hero-sub strong {
        color: white;
        font-weight: 500;
    }

    .hero-ctas {
        display: flex;
        gap: 14px;
        align-items: center;
        flex-wrap: wrap;
    }

    .btn-primary {
        background: linear-gradient(135deg, #00D4FF, #8B5CF6);
        color: #050505;
        padding: 15px 32px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        transition: all 0.2s;
        display: inline-block;
    }
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
    }

    /* HERO RIGHT */
    .hero-right {
        padding: 80px 64px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #0A0A0A;
        position: relative;
        overflow: hidden;
    }

    .hero-right::before {
        content: '';
        position: absolute;
        top: -100px;
        right: -100px;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(0, 212, 255, 0.15) 0%, transparent 70%);
    }

    .chaos-box {
        width: 100%;
        max-width: 420px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 28px;
        margin-bottom: 20px;
    }

    .chaos-label {
        font-family: 'Sora', sans-serif;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 18px;
    }

    .chaos-label.bad { color: #FF6B6B; }
    .chaos-label.good { color: #00C47D; }

    .chaos-items {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .chaos-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 0.85rem;
    }

    .chaos-item.bad {
        background: rgba(255, 107, 107, 0.08);
        color: rgba(255, 255, 255, 0.65);
        border: 1px solid rgba(255, 107, 107, 0.2);
    }

    .chaos-item.good {
        background: rgba(0, 196, 125, 0.08);
        color: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(0, 196, 125, 0.2);
    }

    .chaos-icon {
        font-size: 1rem;
        flex-shrink: 0;
    }

    .arrow-transform {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin: 8px 0;
        color: rgba(255, 255, 255, 0.3);
        font-size: 0.75rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-family: 'Sora', sans-serif;
    }

    .arrow-transform svg {
        background: linear-gradient(90deg, #00D4FF, #8B5CF6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    /* TRUST STRIP */
    .trust-strip {
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding: 24px 80px;
        display: flex;
        align-items: center;
        gap: 0;
        overflow: hidden;
        background: #0A0A0A;
    }

    .trust-label {
        font-size: 0.72rem;
        font-weight: 500;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #71717A;
        white-space: nowrap;
        padding-right: 40px;
        border-right: 1px solid rgba(255, 255, 255, 0.05);
        margin-right: 40px;
        flex-shrink: 0;
    }

    .trust-badges {
        display: flex;
        gap: 36px;
        align-items: center;
        flex-wrap: wrap;
    }

    .trust-badge {
        font-family: 'Sora', sans-serif;
        font-weight: 700;
        font-size: 0.8rem;
        color: #71717A;
        letter-spacing: 0.5px;
        opacity: 0.6;
    }

    /* STATS SECTION */
    .stats-section {
        padding: 100px 80px;
        background: #050505;
    }

    .section-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 60px;
        gap: 40px;
    }

    .section-header-left {
        max-width: 520px;
    }

    h2 {
        font-family: 'Sora', sans-serif;
        font-size: 1rem;
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -1.5px;
        color: white;
        margin-bottom: 16px;
    }

    .section-sub {
        font-size: 1rem;
        color: #71717A;
        max-width: 400px;
        line-height: 1.7;
        font-weight: 300;
    }

    .source-note {
        font-size: 0.75rem;
        color: #71717A;
        opacity: 0.7;
        margin-top: 8px;
        font-style: italic;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 1px;
    }

    .stat-card {
        background: #0A0A0A;
        padding: 40px 32px;
        position: relative;
        overflow: hidden;
        transition: all 0.3s;
    }

    .stat-card:hover {
        background: rgba(0, 212, 255, 0.05);
    }

    .stat-card::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #00D4FF, #8B5CF6);
        transform: scaleX(0);
        transition: transform 0.3s ease;
        transform-origin: left;
    }

    .stat-card:hover::after {
        transform: scaleX(1);
    }

    .stat-number {
        font-family: 'Sora', sans-serif;
        font-size: 3.2rem;
        font-weight: 800;
        line-height: 1;
        color: white;
        letter-spacing: -2px;
        margin-bottom: 10px;
    }

    .stat-number span {
        background: linear-gradient(90deg, #00D4FF, #8B5CF6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .stat-desc {
        font-size: 0.88rem;
        color: #71717A;
        line-height: 1.5;
        font-weight: 400;
    }

    .stat-source {
        font-size: 0.68rem;
        color: #71717A;
        opacity: 0.5;
        margin-top: 12px;
        font-style: italic;
    }

    .stats-row2 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-top: none;
        border-radius: 0 0 12px 12px;
        overflow: hidden;
    }

    /* DEPARTMENTS */
    .departments {
        padding: 100px 80px;
        background: #0A0A0A;
    }

    .departments h2 {
        color: white;
    }
    .departments .section-sub {
        color: rgba(255, 255, 255, 0.45);
    }
    .departments .eyebrow {
        background: linear-gradient(90deg, #00D4FF, #8B5CF6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .dept-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 1px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        overflow: hidden;
        margin-top: 60px;
    }

    .dept-card {
        background: rgba(255, 255, 255, 0.02);
        padding: 36px 28px;
        transition: all 0.3s;
        cursor: default;
    }

    .dept-card:hover {
        background: rgba(0, 212, 255, 0.08);
    }

    .dept-icon {
        font-size: 1.8rem;
        margin-bottom: 18px;
        display: block;
    }

    .dept-name {
        font-family: 'Sora', sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        color: white;
        margin-bottom: 16px;
        letter-spacing: 0.3px;
    }

    .dept-tasks {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .dept-tasks li {
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.45);
        display: flex;
        align-items: flex-start;
        gap: 8px;
        line-height: 1.4;
    }

    .dept-tasks li::before {
        content: '→';
        background: linear-gradient(90deg, #00D4FF, #8B5CF6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        flex-shrink: 0;
        font-size: 0.75rem;
    }

    .dept-stat {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        font-family: 'Sora', sans-serif;
        font-weight: 700;
        font-size: 1.4rem;
        color: #00C47D;
    }

    .dept-stat small {
        display: block;
        font-family: 'Inter', sans-serif;
        font-weight: 300;
        font-size: 0.7rem;
        color: rgba(255, 255, 255, 0.35);
        margin-top: 2px;
    }

    /* PROCESS */
    .process {
        padding: 100px 80px;
        background: #050505;
    }

    .process-steps {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0;
        margin-top: 60px;
        position: relative;
    }

    .process-steps::before {
        content: '';
        position: absolute;
        top: 32px;
        left: 10%;
        right: 10%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.3), transparent);
        z-index: 0;
    }

    .step {
        padding: 0 24px;
        position: relative;
        z-index: 1;
    }

    .step-num {
        width: 64px;
        height: 64px;
        background: #0A0A0A;
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Sora', sans-serif;
        font-weight: 800;
        font-size: 1.5rem;
        color: white;
        margin-bottom: 24px;
        transition: all 0.3s;
    }

    .step:hover .step-num {
        background: linear-gradient(135deg, #00D4FF, #8B5CF6);
        color: #050505;
        border-color: transparent;
    }

    .step-title {
        font-family: 'Sora', sans-serif;
        font-weight: 700;
        font-size: 1.5rem;
        margin-bottom: 10px;
        color: white;
    }

    .step-desc {
        font-size: 1.1rem;
        color: #71717A;
        line-height: 1.6;
    }

    /* ROI BANNER */
    .roi-banner {
        margin: 0 80px;
        background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(139, 92, 246, 0.1));
        border: 1px solid rgba(0, 212, 255, 0.2);
        border-radius: 16px;
        padding: 60px 80px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 60px;
        align-items: center;
        position: relative;
        overflow: hidden;
    }

    .roi-banner::before {
        content: '';
        position: absolute;
        top: -60px;
        right: 200px;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(0, 212, 255, 0.15) 0%, transparent 70%);
    }

    .roi-banner h2 {
        color: white;
    }
    .roi-banner .section-sub {
        color: rgba(255, 255, 255, 0.45);
    }

    .roi-numbers {
        display: flex;
        gap: 40px;
        flex-shrink: 0;
    }

    .roi-num {
        text-align: center;
    }

    .roi-val {
        font-family: 'Sora', sans-serif;
        font-size: 2.8rem;
        font-weight: 800;
        background: linear-gradient(90deg, #00D4FF, #8B5CF6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -2px;
        line-height: 1;
        display: block;
    }

    .roi-lbl {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.4);
        margin-top: 6px;
        display: block;
    }

    /* FORM SECTION */
    .form-section {
        padding: 100px 80px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 80px;
        align-items: start;
        background: #050505;
    }

    .form-left {}

    .form-left h2 {
        margin-bottom: 16px;
    }

    .form-features {
        margin-top: 40px;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .form-feature {
        display: flex;
        gap: 16px;
        align-items: flex-start;
    }

    .form-feature-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(139, 92, 246, 0.2));
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        flex-shrink: 0;
    }

    .form-feature-text strong {
        display: block;
        font-weight: 600;
        font-size: 0.9rem;
        margin-bottom: 2px;
        color: white;
    }

    .form-feature-text span {
        font-size: 0.82rem;
        color: #71717A;
    }

    .contact-form {
        background: #0A0A0A;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        padding: 48px;
        position: sticky;
        top: 100px;
    }

    .form-title {
        font-family: 'Sora', sans-serif;
        font-weight: 800;
        font-size: 1.5rem;
        letter-spacing: -0.5px;
        margin-bottom: 6px;
        color: white;
    }

    .form-subtitle {
        font-size: 0.875rem;
        color: #71717A;
        margin-bottom: 32px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        font-size: 0.8rem;
        font-weight: 500;
        color: white;
        margin-bottom: 8px;
        letter-spacing: 0.2px;
    }

    input, select, textarea {
        width: 100%;
        padding: 13px 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        font-family: 'Inter', sans-serif;
        font-size: 0.9rem;
        color: white;
        background: rgba(255, 255, 255, 0.03);
        transition: all 0.2s;
        outline: none;
        appearance: none;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #00D4FF;
